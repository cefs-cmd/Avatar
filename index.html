<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
<style>
    /* mudando a tela principal */
body{
 font-family: arial, sans-serif;
 background-color: #000000;
 display: flex;
 justify-content: center;
 align-items: center;
 height: 100vh;
 margin: 0;
}
/*mudando o documneto em si*/
form{
    background-color: hsl(0, 0%, 12%);
    padding : 30px;
    border-radius: 30px;
    box-shadow: 0 0 20px color: green;
    width: 350px;
}

 button{
 width: 100%; /*ajustar tamanho*/
 padding: 15px; /*ajustar tamanho da largura*/
 border: none;  /*bordas ativadas*/
 border-radius: 10px; /*ajustar  tamanho das bordas*/
 background-color: #333; /*ajustar cor das bordas ou de qualquer outra coisa que queira*/
 color: white; /*ajustar cor*/
 font-size: 700; /*ajustar tamanho da letra na pagina*/
 cursor: pointer;  /*Muda o cursor para clicar*/
 transition: 0.3s ease; /*cria uma mudança suave e animada em um elemento sempre que seu estado é alterado*/
}
button:hover{ /*so para mudar o curo quando clicar*/
    background-color: #c4f82a;  /*cor de fundo*/
    color: #1f1f1f; /*Ajusta a cor*/
}

img {
    border-radius: 100px;
}
</style>
</head>
<body>
<form>
<center>
